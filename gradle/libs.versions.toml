[versions]
agp = "9.1.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
appcompat = "1.7.1"
material = "1.13.0"
activity = "1.13.0"
constraintlayout = "2.2.1"
room = "2.6.1"
fragment = "1.8.5"
recyclerview = "1.3.2"
lifecycle = "2.8.7"
drawerlayout = "1.2.0"
zxing = "3.5.3"
okhttp = "4.12.0"
