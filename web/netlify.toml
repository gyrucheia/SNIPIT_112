# Netlify Configuration for SnipIT Web Portal
# This file helps Netlify know how to deploy your site

[build]
  # Since we're serving static files, no build step needed
  command = ""
  publish = "."

# Redirect all non-file requests to index.html (for SPA routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache strategy for static assets
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Allow Firebase requests (CORS for external APIs)
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
